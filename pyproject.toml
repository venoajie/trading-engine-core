
# .github/workflows/python-publish.yml
#
# Standardized CI/CD pipeline for shared Python libraries.
#
# This workflow performs the following actions:
# 1. On Pull Requests to `main`:
#    - Lints code using Ruff.
#    - Runs unit tests with Pytest and enforces a 95% coverage minimum.
# 2. On Push to `main` (after a PR is merged):
#    - Performs all the above checks.
#    - If checks pass, it uses the dedicated python-semantic-release action to:
#      - Correctly handle the Git environment and tag history.
#      - Determine the next semantic version, tag, and create a GitHub Release.
#      - Build and publish the package to the configured GitHub Packages registry.

name: Python Package CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Test with Pytest and generate coverage report
        run: |
          pytest \
            --cov=src \
            --cov-report=xml \
            --cov-fail-under=95

  publish:
    name: Publish to GitHub Packages
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- START CORRECTION ---
      # This is the final, definitive configuration.
      - name: Perform Semantic Release and Publish
        uses: relekang/python-semantic-release@v9
        with:
          # The github_token is used by the action to create GitHub Releases.
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          # These environment variables are used by `twine` (inside the action)
          # to authenticate and publish the package to the GitHub Package Registry.
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      # --- END CORRECTION ---