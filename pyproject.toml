
# pyproject.toml
#
# This file serves as the central configuration for the Python project,
# using the setuptools build backend.

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "trading-engine-core"
version = "0.1.0"
authors = [
    { name = "Trading Systems Team", email = "ven.ajie@protonmail.com" },
]
description = "Core data contracts, models, and protocols for the trading engine."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Proprietary" }
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
]
dependencies = [
    "pydantic>=2.0",
]

[project.urls]
"Homepage" = "https://github.com/venoajie/trading-engine-core"
"Repository" = "https://github.com/venoajie/trading-engine-core"

# Specifies the directory where the package source code resides.
[tool.setuptools.packages.find]
where = ["src"]

# Defines optional dependencies for development, testing, and releasing.
# These are installed by `pip install -e .[dev]` in the CI pipeline.
[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "python-semantic-release>=9.0",
    "build>=1.0",
]

# --- Tool Configurations ---

# Configuration for python-semantic-release.
[tool.semantic_release]
version_variables = ["pyproject.toml:project.version"]
build_command = "python -m build"
commit_parser = "conventional"
changelog_file = "CHANGELOG.md"
repository = "github"
branch = "main"
upload_to_repository = true
upload_to_release = false

# Configuration for the Ruff linter and formatter.
[tool.ruff]
line-length = 88
src = ["src"]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"

# Configuration for Pytest.
[tool.pytest.ini_options]
addopts = "--cov=src --cov-report=term-missing"
testpaths = [
    "tests",
]