
# .github/workflows/python-publish.yml
#
# Definitive CI/CD pipeline for shared Python libraries.
# THIS VERSION CONTAINS A TEMPORARY DEBUGGING STEP.

name: Python Package CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .
      - name: Test with Pytest and generate coverage report
        run: |
          pytest \
            --cov=src \
            --cov-report=xml \
            --cov-fail-under=95

  # --- TEMPORARY DEBUGGING JOB ---
  # This job will isolate the twine upload command to get a raw error message.
  debug-upload:
    name: Debug Package Upload
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build dependencies
        run: python -m pip install --upgrade pip build twine
      - name: Build package
        run: python -m build
      - name: Attempt to Upload Package with Verbose Output
        env:
          # Use the GITHUB_TOKEN for authentication
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          twine upload \
            --verbose \
            --repository-url https://pypi.pkg.github.com/venoajie \
            dist/*

  # --- ORIGINAL PUBLISH JOB (Temporarily Disabled) ---
  publish:
    name: Publish to GitHub Packages
    needs: validate
    runs-on: ubuntu-latest
    # Temporarily disable this job by making the condition false
    if: false 
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install release dependencies
        run: python -m pip install --upgrade pip python-semantic-release build
      - name: Configure Git for CI/CD
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Publish new version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release publish