
# .github/workflows/python-publish.yml
# FINAL VERSION - Uses a Personal Access Token (PAT) for authentication.

name: Python Package CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .
      - name: Test with Pytest and generate coverage report
        run: |
          pytest \
            --cov=src \
            --cov-report=xml \
            --cov-fail-under=95

  publish:
    name: Publish to GitHub Packages
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install release dependencies
        run: python -m pip install --upgrade pip python-semantic-release build
      - name: Configure Git for CI/CD
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Publish new version
        env:
          # Use the PAT for all GitHub API interactions.
          GH_TOKEN: ${{ secrets.GH_PAT }}
          # Explicitly set Twine credentials to use the PAT.
          TWINE_USERNAME: venoajie # When using a PAT, the username is the account owner.
          TWINE_PASSWORD: ${{ secrets.GH_PAT }}
        run: semantic-release publish