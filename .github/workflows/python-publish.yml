# .github/workflows/python-publish.yml
#
# Standardized CI/CD pipeline for shared Python libraries.
#
# This workflow performs the following actions:
# 1. On Pull Requests to `main`:
#    - Lints code using Ruff.
#    - Runs unit tests with Pytest and enforces a 95% coverage minimum.
# 2. On Push to `main` (after a PR is merged):
#    - Performs all the above checks.
#    - If checks pass, it correctly bootstraps the initial release or
#      publishes subsequent versions based on conventional commits.

name: Python Package CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Test with Pytest and generate coverage report
        run: |
          pytest \
            --cov=src \
            --cov-report=xml \
            --cov-fail-under=95

  publish:
    name: Publish to GitHub Packages
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install release dependencies
        run: python -m pip install python-semantic-release build

      - name: Configure Git for CI/CD
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Bootstrap Initial Release or Publish New Version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if any tags exist in the repository.
          # The `|| true` prevents the script from failing if no tags are found.
          LATEST_TAG=$(git describe --tags --abbrev=0 || true)

          if [ -z "$LATEST_TAG" ]; then
            # NO TAGS EXIST: This is the first release.
            # We will manually create the required state (tag and release)
            # that semantic-release expects to find.
            echo "No tags found. Bootstrapping initial release v0.1.0."
            
            # Step 1: Create the git tag locally.
            git tag v0.1.0
            
            # Step 2: Create the GitHub Release object from the tag.
            # This uses the official GitHub CLI, which is pre-installed on runners.
            gh release create v0.1.0 --notes "Initial release"
          else
            echo "Tags found. Proceeding with standard release process."
          fi

          # Let semantic-release handle the final steps.
          # If we bootstrapped, it will find the v0.1.0 release and upload assets.
          # If not, it will calculate the next version from commits and publish it.
          semantic-release publish