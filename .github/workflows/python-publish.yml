
# .github/workflows/python-publish.yml
#
# Definitive CI/CD pipeline for shared Python libraries.
# This workflow contains an explicit, robust bootstrap sequence for the
# first release, and a fully automated sequence for all subsequent releases.

name: Python Package CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Test with Pytest and generate coverage report
        run: |
          pytest \
            --cov=src \
            --cov-report=xml \
            --cov-fail-under=95

  publish:
    name: Publish to GitHub Packages
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install release dependencies
        run: python -m pip install --upgrade pip python-semantic-release build twine

      - name: Configure Git for CI/CD
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Bootstrap Initial Release or Publish New Version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # For twine, the password is the GitHub token. The username can be the actor's name or __token__.
          TWINE_USERNAME: ${{ github.actor }}
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if any tags exist in the repository.
          LATEST_TAG=$(git describe --tags --abbrev=0 || true)

          if [ -z "$LATEST_TAG" ]; then
            # NO TAGS EXIST: This is the definitive bootstrap sequence.
            echo "No tags found. Bootstrapping initial release v0.1.0."
            
            # Step 1: Tag and push to remote.
            git tag v0.1.0
            git push origin v0.1.0
            
            # Step 2: Build the package distributions.
            python -m build

            # Step 3: Publish the distributions to GitHub Packages registry using twine.
            # This is the critical step that populates the "Packages" section.
            twine upload --repository-url https://pypi.pkg.github.com/${{ github.repository_owner }} dist/*

            # Step 4: Create the corresponding GitHub Release for discoverability.
            gh release create v0.1.0 --notes "Initial release"

            # Step 5: (Optional but recommended) Upload assets to the release page.
            gh release upload v0.1.0 dist/*
          else
            # TAGS EXIST: Let semantic-release handle the fully automated process.
            echo "Tags found. Running standard publish."
            semantic-release publish
          fi