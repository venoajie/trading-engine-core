
# .github/workflows/python-publish.yml
#
# Standardized CI/CD pipeline for shared Python libraries.
#
# This workflow performs the following actions:
# 1. On Pull Requests to `main`:
#    - Lints code using Ruff.
#    - Runs unit tests with Pytest and enforces a 95% coverage minimum.
# 2. On Push to `main` (after a PR is merged):
#    - Performs all the above checks.
#    - If checks pass, it uses python-semantic-release to:
#      - Determine the next semantic version based on conventional commit messages.
#      - Generate a CHANGELOG.md.
#      - Create a new Git tag and GitHub Release.
#      - Build the source distribution and wheel.
#      - Publish the package to the GitHub Packages registry.

name: Python Package CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Assumes Python 3.12 is the target version.
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Test with Pytest and generate coverage report
        run: |
          pytest \
            --cov=src \
            --cov-report=xml \
            --cov-fail-under=95

  publish:
    name: Publish to GitHub Packages
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- START CORRECTION ---
      # This step is critical. It ensures that all tags are available to the runner,
      # which is required for semantic-release to determine the last version.
      - name: Fetch all history and tags
        run: git fetch --prune --unshallow --tags
      # --- END CORRECTION ---

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build and release dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build python-semantic-release

      - name: Build package
        run: python -m build

      - name: 📦 [DIAGNOSTIC] Verify build artifacts
        run: ls -l dist/

      - name: Perform Semantic Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          TWINE_REPOSITORY_URL: https://pypi.pkg.github.com/venoajie
        run: |
          semantic-release publish