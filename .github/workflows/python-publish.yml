
# .github/workflows/python-publish.yml
#
# Standardized CI/CD pipeline for shared Python libraries.
#
# This workflow performs the following actions:
# 1. On Pull Requests to `main`:
#    - Lints code using Ruff.
#    - Runs unit tests with Pytest and enforces a 95% coverage minimum.
# 2. On Push to `main` (after a PR is merged):
#    - Performs all the above checks.
#    - If checks pass, it correctly bootstraps the initial release or
#      publishes subsequent versions based on conventional commits.

name: Python Package CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Test with Pytest and generate coverage report
        run: |
          pytest \
            --cov=src \
            --cov-report=xml \
            --cov-fail-under=95

  publish:
    name: Publish to GitHub Packages
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install release dependencies
        run: python -m pip install python-semantic-release build

      - name: Configure Git for CI/CD
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Bootstrap Initial Release or Publish New Version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if any tags exist in the repository.
          # The `|| true` prevents the script from failing if no tags are found.
          LATEST_TAG=$(git describe --tags --abbrev=0 || true)

          if [ -z "$LATEST_TAG" ]; then
            # NO TAGS EXIST: This is the first release.
            # Step 1: Force the creation of the version tag and GitHub Release object.
            echo "No tags found. Bootstrapping initial version v0.1.0."
            semantic-release version --new-version 0.1.0

            # Step 2: Publish assets to the newly created release.
            echo "Publishing assets to v0.1.0."
            semantic-release publish
          else
            # TAGS EXIST: Let semantic-release determine the next version automatically.
            echo "Tags found. Running standard publish."
            semantic-release publish
          fi