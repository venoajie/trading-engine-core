
# .github/workflows/python-publish.yml
#
# Definitive CI/CD pipeline for shared Python libraries.
# This workflow contains the final, correct endpoint URL for twine.

name: Python Package CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Test with Pytest and generate coverage report
        run: |
          pytest \
            --cov=src \
            --cov-report=xml \
            --cov-fail-under=95

  publish:
    name: Publish to GitHub Packages
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install release dependencies
        run: python -m pip install --upgrade pip python-semantic-release build twine

      - name: Configure Git for CI/CD
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Bootstrap Initial Release or Publish New Version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 || true)

          if [ -z "$LATEST_TAG" ]; then
            echo "No tags found. Bootstrapping initial release v0.1.0."
            
            git tag v0.1.0
            git push origin v0.1.0
            
            python -m build
            
            twine check dist/*
            
            # This is the definitive fix. The URL must be scoped to the repository.
            twine upload --verbose --repository-url https://pypi.pkg.github.com/${{ github.repository }} dist/*

            gh release create v0.1.0 --notes "Initial release"
            
            gh release upload v0.1.0 dist/*
          else
            echo "Tags found. Running standard publish."
            semantic-release publish
          fi